<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Simple admin editor for the Frank Vitak portfolio.">
  <title>Frank Vitak | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a class="admin-launch" href="./admin.html">Admin</a>
  <div class="page-shell">
    <main>
      <section class="panel admin-panel">
        <div class="section-header admin-header">
          <div>
            <p class="section-label">Admin</p>
            <h2>Edit links, images, and summary content.</h2>
            <p class="admin-build">Build `admin-v4`</p>
          </div>
          <p class="section-intro">
            Changes save directly to the live site configuration and uploaded assets used by visitors.
          </p>
        </div>

        <form id="admin-form" class="admin-form">
          <label class="admin-field">
            <span>Professional Summary</span>
            <textarea name="summary_copy" rows="6"></textarea>
          </label>

          <div class="admin-grid">
            <label class="admin-field">
              <span>Resume Page Link</span>
              <input type="text" name="resume_page">
            </label>
            <label class="admin-field">
              <span>Resume PDF Link</span>
              <input type="text" name="resume_pdf">
            </label>
            <label class="admin-field">
              <span>Replace Resume PDF</span>
              <input type="file" name="resume_pdf_file" accept=".pdf,application/pdf">
            </label>
            <label class="admin-field">
              <span>LinkedIn URL</span>
              <input type="text" name="linkedin_url">
            </label>
            <label class="admin-field">
              <span>Email Link</span>
              <input type="text" name="email_url">
            </label>
            <label class="admin-field">
              <span>CSM Certificate Link</span>
              <input type="text" name="csm_url">
            </label>
            <label class="admin-field">
              <span>Replace CSM Certificate</span>
              <input type="file" name="csm_url_file" accept=".pdf,application/pdf">
            </label>
            <label class="admin-field">
              <span>CSPO Certificate Link</span>
              <input type="text" name="cspo_url">
            </label>
            <label class="admin-field">
              <span>Replace CSPO Certificate</span>
              <input type="file" name="cspo_url_file" accept=".pdf,application/pdf">
            </label>
            <label class="admin-field">
              <span>Escape the Cube URL</span>
              <input type="text" name="escape_url">
            </label>
            <label class="admin-field">
              <span>Escape the Cube Image</span>
              <input type="text" name="escape_image">
            </label>
            <label class="admin-field">
              <span>Replace Escape the Cube Image</span>
              <input type="file" name="escape_image_file" accept="image/*">
            </label>
            <label class="admin-field">
              <span>DnD Simulator URL</span>
              <input type="text" name="dnd_url">
            </label>
            <label class="admin-field">
              <span>DnD Simulator Image</span>
              <input type="text" name="dnd_image">
            </label>
            <label class="admin-field">
              <span>Replace DnD Image</span>
              <input type="file" name="dnd_image_file" accept="image/*">
            </label>
            <label class="admin-field">
              <span>Common Core URL</span>
              <input type="text" name="common_core_url">
            </label>
            <label class="admin-field">
              <span>Common Core Image</span>
              <input type="text" name="common_core_image">
            </label>
            <label class="admin-field">
              <span>Replace Common Core Image</span>
              <input type="file" name="common_core_image_file" accept="image/*">
            </label>
          </div>

          <div class="admin-actions">
            <button type="button" class="button" id="admin-save-button" onclick="window.__openAdminPasswordModal && window.__openAdminPasswordModal()">Save Changes</button>
            <a class="ghost-link" href="./index.html">Back To Site</a>
          </div>

          <p id="admin-status" class="admin-status"></p>
        </form>
      </section>
    </main>
  </div>

  <div class="contact-modal" id="admin-password-modal" hidden>
    <div class="contact-modal-backdrop" data-admin-password-close="true" onclick="window.__closeAdminPasswordModal && window.__closeAdminPasswordModal()"></div>
    <div class="contact-modal-dialog panel">
      <div class="contact-modal-header">
        <div>
          <p class="section-label">Save Changes</p>
          <h2>Enter admin password</h2>
        </div>
        <button type="button" class="ghost-link contact-close" data-admin-password-close="true" onclick="window.__closeAdminPasswordModal && window.__closeAdminPasswordModal()">Close</button>
      </div>

      <div class="contact-form">
        <label class="admin-field">
          <span>Password</span>
          <input type="password" id="admin-password-input" autocomplete="current-password">
        </label>

        <div class="admin-actions">
          <button type="button" class="button" id="admin-password-confirm" onclick="window.__runAdminSave && window.__runAdminSave()">Continue</button>
        </div>

        <p id="admin-password-status" class="admin-status"></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { upload } from "https://esm.sh/@vercel/blob/client";

    const DEFAULT_SITE_CONFIG = {
      summary_copy: "Certified Scrum Product Owner (CSPO) and Certified ScrumMaster (CSM) with four years of hands-on experience owning backlogs, writing user stories and acceptance criteria, and keeping cross-functional teams aligned in JIRA. I've worked across consumer-facing marketplaces and enterprise SaaS platforms, and I'm most effective at the translation layer: turning complex business requirements and stakeholder needs into clear, buildable specs. Data-driven by habit, documentation-disciplined by practice. The projects below are what I build when I'm not at work.",
      resume_page: "./resume.html",
      resume_pdf: "./documents/frank-vitak-resume.pdf",
      resume_back_home: "./index.html",
      linkedin_url: "https://www.linkedin.com/in/frankvitak",
      email_url: "mailto:fvitak@gmail.com",
      csm_url: "./documents/frank-vitak-csm-certificate.pdf",
      cspo_url: "./documents/frank-vitak-cspo-certificate.pdf",
      escape_url: "https://escape-the-cubes.vercel.app/",
      escape_image: "./images/escape-the-cube.png",
      dnd_url: "https://spring-ridge-dnd.vercel.app/",
      dnd_image: "./images/dnd-simulator.png",
      common_core_url: "https://common-core-for-old-people.vercel.app/",
      common_core_image: "./images/common-core-old-brains.png"
    };

    async function getSiteConfig() {
      try {
        const response = await fetch("/api/config", { cache: "no-store" });
        if (!response.ok) {
          return DEFAULT_SITE_CONFIG;
        }

        const payload = await response.json();
        return {
          ...DEFAULT_SITE_CONFIG,
          ...(payload.config || {})
        };
      } catch (error) {
        return DEFAULT_SITE_CONFIG;
      }
    }

    async function readJsonResponse(response) {
      const text = await response.text();
      if (!text) {
        return {};
      }

      try {
        return JSON.parse(text);
      } catch (error) {
        return { error: text };
      }
    }

    async function fileToBase64(file) {
      const buffer = await file.arrayBuffer();
      let binary = "";
      const bytes = new Uint8Array(buffer);
      const chunkSize = 0x8000;

      for (let index = 0; index < bytes.length; index += chunkSize) {
        const chunk = bytes.subarray(index, index + chunkSize);
        binary += String.fromCharCode(...chunk);
      }

      return btoa(binary);
    }

    (async function initializeAdmin() {
      const form = document.querySelector("#admin-form");
      const status = document.querySelector("#admin-status");
      const saveButton = document.querySelector("#admin-save-button");
      const passwordModal = document.querySelector("#admin-password-modal");
      const passwordInput = document.querySelector("#admin-password-input");
      const passwordStatus = document.querySelector("#admin-password-status");
      const passwordConfirm = document.querySelector("#admin-password-confirm");

      const openPasswordModal = () => {
        passwordModal.hidden = false;
        passwordInput.value = "";
        passwordStatus.textContent = "";
        document.body.style.overflow = "hidden";
        passwordInput.focus();
      };

      window.__openAdminPasswordModal = openPasswordModal;

      const closePasswordModal = () => {
        passwordModal.hidden = true;
        passwordInput.value = "";
        passwordStatus.textContent = "";
        document.body.style.overflow = "";
      };

      window.__closeAdminPasswordModal = closePasswordModal;

      const runSave = async () => {
        try {
          const password = passwordInput.value;

          status.textContent = "Saving changes...";
          status.dataset.state = "";
          passwordStatus.textContent = "Processing save...";
          passwordStatus.dataset.state = "";

          if (!password) {
            throw new Error("Password is required.");
          }

          const nextConfig = {};
          Object.keys(DEFAULT_SITE_CONFIG).forEach((key) => {
            const field = form.elements.namedItem(key);
            nextConfig[key] = field && typeof field.value === "string" && field.value.trim()
              ? field.value.trim()
              : DEFAULT_SITE_CONFIG[key];
          });

          const uploadFields = [
            "resume_pdf",
            "csm_url",
            "cspo_url",
            "escape_image",
            "dnd_image",
            "common_core_image"
          ];

          for (const fieldName of uploadFields) {
            const fileField = form.elements.namedItem(`${fieldName}_file`);
            const file = fileField && fileField.files ? fileField.files[0] : null;

            if (!file) {
              continue;
            }

            const blob = await upload(file.name, file, {
              access: "public",
              handleUploadUrl: "/api/upload",
              clientPayload: {
                password,
                field: fieldName
              }
            });

            nextConfig[fieldName] = blob.url;
            form.elements.namedItem(fieldName).value = blob.url;
            fileField.value = "";
          }

          const saveResponse = await fetch("/api/config", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              password,
              config: nextConfig
            })
          });

          const savePayload = await readJsonResponse(saveResponse);
          if (!saveResponse.ok) {
            throw new Error(savePayload.error || "Unable to save config.");
          }

          closePasswordModal();
          status.textContent = "Changes saved for all visitors. Refresh the public page to confirm the update.";
          status.dataset.state = "success";
        } catch (error) {
          const message = error.message || "Unable to save changes.";
          passwordStatus.textContent = message;
          passwordStatus.dataset.state = "error";
          status.textContent = message;
          status.dataset.state = "error";
        }
      };

      window.__runAdminSave = runSave;

      saveButton.addEventListener("click", openPasswordModal);
      passwordConfirm.addEventListener("click", runSave);

      passwordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          runSave();
        }
      });

      passwordModal.querySelectorAll("[data-admin-password-close='true']").forEach((closer) => {
        closer.addEventListener("click", closePasswordModal);
      });

      const config = await getSiteConfig();
      Object.entries(DEFAULT_SITE_CONFIG).forEach(([key, value]) => {
        const field = form.elements.namedItem(key);
        if (field) {
          field.value = config[key] || value;
        }
      });
    })();
  </script>
</body>
</html>
