<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Resume page for Frank Vitak with preview and download.">
  <title>Frank Vitak | Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero subpage-hero">
      <nav class="topbar" aria-label="Primary">
        <span class="brand">Frank Vitak</span>
        <a class="ghost-link tracked-link" href="./index.html" data-analytics-label="resume_back_home">Back Home</a>
      </nav>

      <div class="hero-copy compact-copy">
        <p class="eyebrow">Resume</p>
        <h1 class="subpage-title">Professional background and downloadable PDF.</h1>
        <p class="lead">
          This page gives visitors a quick way to preview your resume in-browser or download the file directly.
        </p>

        <div class="hero-actions">
          <a
            class="button tracked-link"
            href="./documents/frank-vitak-resume.pdf"
            target="_blank"
            rel="noreferrer"
            data-analytics-label="resume_open_pdf"
          >
            Open PDF
          </a>
          <a
            class="button button-secondary tracked-link"
            href="./documents/frank-vitak-resume.pdf"
            download="Frank-Vitak-Resume.pdf"
            data-analytics-label="resume_download_pdf"
          >
            Download Resume
          </a>
        </div>
      </div>
    </header>

    <main>
      <section class="panel resume-panel">
        <div class="section-header">
          <div>
            <p class="section-label">Preview</p>
            <h2>Embedded resume document</h2>
          </div>
          <a
            class="ghost-link tracked-link"
            href="./documents/frank-vitak-resume.pdf"
            download="Frank-Vitak-Resume.pdf"
            data-analytics-label="resume_download_secondary"
          >
            Download PDF
          </a>
        </div>

        <div class="resume-frame-wrap">
          <iframe
            class="resume-frame"
            src="./documents/frank-vitak-resume.pdf"
            title="Frank Vitak Resume"
          ></iframe>
        </div>
      </section>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
