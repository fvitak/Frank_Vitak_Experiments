<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Resume page for Frank Vitak with embedded preview and downloadable PDF.">
  <title>Frank Vitak | Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a class="admin-launch" href="./admin.html">Admin</a>
  <div class="page-shell">
    <header class="hero subpage-hero">
      <nav class="topbar" aria-label="Primary">
        <span class="brand resume-name">Frank Vitak</span>
        <a class="ghost-link tracked-link" href="./index.html" data-analytics-label="resume_back_home" data-config-link="resume_back_home">Back Home</a>
      </nav>

      <div class="hero-copy compact-copy">
        <div class="hero-actions">
          <a
            class="button tracked-link"
            href="./documents/frank-vitak-resume.pdf"
            target="_blank"
            rel="noreferrer"
            data-analytics-label="resume_open_pdf"
            data-config-link="resume_pdf"
          >
            Open PDF
          </a>
          <a
            class="button button-secondary tracked-link"
            href="./documents/frank-vitak-resume.pdf"
            download="Frank-Vitak-Resume.pdf"
            data-analytics-label="resume_download_pdf"
            data-config-link="resume_pdf"
          >
            Download Resume
          </a>
        </div>
      </div>
    </header>

    <main>
      <section class="panel resume-panel">
        <div class="section-header">
          <a
            class="ghost-link tracked-link"
            href="./documents/frank-vitak-resume.pdf"
            download="Frank-Vitak-Resume.pdf"
            data-analytics-label="resume_download_secondary"
            data-config-link="resume_pdf"
          >
            Download PDF
          </a>
        </div>

        <div class="resume-image-wrap">
          <img
            class="resume-image"
            src="./images/FJV_Resume_web.png"
            alt="Frank Vitak resume preview"
          >
        </div>
      </section>
    </main>
  </div>

  <script src="./script.js?v=20260423-2"></script>
</body>
</html>
